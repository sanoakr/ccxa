audio:
  input_device: null
  sample_rate: 16000
  channels: 1
  chunk_ms: 32
  noise_gate_db: -40.0
  low_cut_hz: 80.0
  high_cut_hz: 7500.0
  chime_path: "assets/chime.aiff"
  bargein_rms_threshold: 2000.0
  bargein_consecutive_chunks: 3

vad:
  threshold: 0.35
  min_speech_ms: 200
  min_silence_ms: 600

wakeword:
  phrases:
    - "チチクサ"
    - "ちちくさ"
  max_duration_ms: 3000
  fuzzy_threshold: 2

stt:
  model: "holotherapper/lilfugu-8bit"
  language: "Japanese"

llm:
  model: "prism-ml/Ternary-Bonsai-8B-mlx-2bit"
  max_tokens_short: 150
  max_tokens_long: 500
  temperature: 0.7
  top_p: 0.9
  port: 8880
  base_url: "http://localhost:8880/v1"

tts:
  voice: null
  rate: null

search:
  max_results: 3

conversation_timeout: 30
goodbye_phrases:
  - "さようなら"
  - "終わり"
  - "バイバイ"
  - "おやすみ"
